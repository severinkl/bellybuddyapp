name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: |
          find lib test -name '*.dart' \
            ! -name '*.freezed.dart' \
            ! -name '*.g.dart' \
            -print0 | xargs -0 dart format --set-exit-if-changed

      - run: flutter analyze

  unit-tests:
    name: Unit Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test test/models/ test/utils/ test/services/ test/repositories/ test/providers/ --dart-define-from-file=env.json

  widget-tests:
    name: Widget Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run widget tests
        run: flutter test test/screens/ test/widgets/ --dart-define-from-file=env.json

  integration-tests:
    name: Integration Tests
    needs: widget-tests
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - name: Create GoogleService-Info.plist
        run: cp ios/Runner/GoogleService-Info.example.plist ios/Runner/GoogleService-Info.plist

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            for d in devices:
              if 'iPhone' in d['name'] and d['isAvailable']:
                print(d['udid'])
                sys.exit(0)
          sys.exit(1)
          ")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          # Wait for simulator to be fully ready
          xcrun simctl bootstatus "$UDID" -b

      - name: List available devices
        run: flutter devices

      - name: Run integration tests
        run: flutter test integration_test/ -d "$SIMULATOR_UDID" --dart-define-from-file=env.json
