name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Create .env
        run: cp .env.example .env

      - run: flutter pub get

      # Generated files (*.freezed.dart, *.g.dart) are gitignored —
      # must regenerate before analyze/test/build.
      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # Format only hand-written code; exclude generated files.
      - name: Check formatting
        run: |
          find lib test -name '*.dart' \
            ! -name '*.freezed.dart' \
            ! -name '*.g.dart' \
            -print0 | xargs -0 dart format --set-exit-if-changed

      - run: flutter analyze

      - run: flutter test

      - name: Build Android APK (debug)
        run: flutter build apk --debug
