name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: |
          find lib test -name '*.dart' \
            ! -name '*.freezed.dart' \
            ! -name '*.g.dart' \
            -print0 | xargs -0 dart format --set-exit-if-changed

      - run: flutter analyze

  unit-tests:
    name: Unit Tests
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run unit tests
        run: flutter test test/models/ test/utils/ test/services/ test/repositories/ test/providers/ --dart-define-from-file=env.json

  widget-tests:
    name: Widget Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run widget tests
        run: flutter test test/screens/ test/widgets/ --dart-define-from-file=env.json

  integration-tests:
    name: Integration Tests
    needs: widget-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create env.json
        run: cp env.example.json env.json

      - run: flutter pub get

      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: |
            for test_file in integration_test/*_test.dart; do
              echo "Running $test_file..."
              flutter drive \
                --driver=test_driver/integration_test.dart \
                --target="$test_file" \
                -d emulator-5554 \
                --dart-define-from-file=env.json
            done
