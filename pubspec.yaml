name: belly_buddy
description: "Belly Buddy - Dein Bauchgefühl Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Environment
  flutter_dotenv: ^5.2.1

  # Local storage
  shared_preferences: ^2.5.3

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Functionality
  image_picker: ^1.1.2
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  intl: ^0.20.2
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/mascot/
    - assets/images/icons/
    - assets/images/onboarding/
