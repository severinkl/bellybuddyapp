name: belly_buddy
description: "Belly Buddy - Dein Bauchgefühl Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.1.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI
  smooth_page_indicator: ^2.0.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # URL launcher
  url_launcher: ^6.3.1

  # Functionality
  image_picker: ^1.1.2
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  intl: ^0.20.2
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  crypto: ^3.0.7

  # Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter

  # Code generation
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app-icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app-icon.png"

flutter_native_splash:
  color: "#F9F7F4"
  image: assets/images/native-splash.png
  fullscreen: true
  android_12:
    color: "#F9F7F4"
    image: assets/images/app-icon-transparent.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/mascot/
    - assets/images/icons/
